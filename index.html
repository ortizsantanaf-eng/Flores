<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti</title>
    <style>
        body { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Para que las flores no creen barras de scroll */
        }

        /* Estilo de la tarjeta */
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            position: relative;
            z-index: 10;
            border: 2px solid #fff;
        }

        h2 { color: #d4a017; font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #7a5901; font-size: 1rem; font-style: italic; line-height: 1.5; }
        
        .flower-icon { font-size: 80px; margin: 20px 0; display: block; }

        .counter { 
            background: #fffbe6; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            color: #8b6d11; 
            font-size: 0.9rem; 
            border: 1px dashed #ffd700;
            margin-top: 10px;
        }

        .footer { margin-top: 20px; font-size: 0.85rem; color: #b8860b; font-weight: bold; }

        /* Animación de flores cayendo */
        .falling-flower {
            position: fixed;
            top: -10%;
            z-index: 1;
            user-select: none;
            cursor: default;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Flores Amarillas para el amor de mi vida para mi niña con mucho amor tu oso 🌻</h2>
        <p>"Si pudiera elegir un lugar seguro,<br>sería siempre a tu lado."</p>
        <span class="flower-icon">🌻✨</span>
        <div class="footer">Nuestro amor comenzó hace...</div>
        <div id="timer" class="counter">Calculando tiempo...</div>
    </div>

    <script>
        // CONFIGURACIÓN DEL TIEMPO (Año, Mes-1, Día, Hora, Minuto)
        const startDate = new Date(2024, 11, 25, 0, 0, 0); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerHTML = 
                `${days}d ${hours}h ${mins}m ${secs}s`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // FUNCIÓN PARA CREAR FLORES CAYENDO
        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('falling-flower');
            flower.innerHTML = '🌻'; // Puedes usar 🌸 o 🌼 también
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 2 + 's'; // Entre 2 y 5 seg
            flower.style.opacity = Math.random();
            flower.style.fontSize = Math.random() * 20 + 10 + 'px';
            
            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 5000);
        }
        setInterval(createFlower, 300); // Crea una flor cada 300ms
    </script>
</body>
</html>
